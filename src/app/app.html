<div class="container">

  <h1>2048</h1>

  <div class="top-bar">

    <div class="score-box">
      Score
      <span>{{score}}</span>
    </div>

    <button (click)="newGame()">
      New Game
    </button>

  </div>


  <div class="board" (pointerdown)="onPointerDown($event)" (pointerup)="onPointerUp($event)">

    @for(row of board; track $index){

    @for(cell of row; track $index){

    <div class="tile" [ngClass]="'tile-'+cell">

      {{cell==0 ? '' : cell}}

    </div>

    }

    }

  </div>

  @if(gameOver){

  <div class="game-over">

    <h2>Game Over 😢</h2>

    <button (click)="newGame()">
      Play Again
    </button>

  </div>

  }

</div>
